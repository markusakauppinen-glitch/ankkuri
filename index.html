<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Haswing Anchor â€“ BLE v2.2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Roboto,sans-serif;background:#111;color:#fff;padding:12px;font-size:14px}
h1{font-size:16px;text-align:center;margin-bottom:4px}
.sub{font-size:11px;opacity:.4;text-align:center;margin-bottom:12px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px}
.card h2{font-size:13px;opacity:.6;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.row{display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px}
.row .l{opacity:.5}
.btn-row{display:flex;gap:8px;margin-bottom:10px}
.btn{flex:1;padding:12px 8px;border-radius:8px;border:2px solid #555;background:#222;color:#fff;font-size:13px;font-weight:bold;cursor:pointer;text-align:center}
.btn:disabled{opacity:.25}
.btn:active:not(:disabled){background:#444}
.btn.big{padding:20px;font-size:16px;border-color:#888}
.btn.big.active{background:#fff;color:#111;border-color:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.log{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:8px;font-family:'Courier New',monospace;font-size:10px;line-height:1.5;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>

<h1>âš“ HASWING ANCHOR v2.2</h1>
<p class="sub">Init sequence from HCI log</p>

<div class="card">
 <h2>Tila</h2>
 <div class="row"><span class="l">BLE:</span><span id="sB">Ei yhdistetty</span></div>
 <div class="row"><span class="l">Handshake:</span><span id="sH">---</span></div>
 <div class="row"><span class="l">Laite:</span><span id="sD">---</span></div>
 <div class="row"><span class="l">Ankkuri:</span><span id="sA">---</span></div>
 <div class="row"><span class="l">Akku:</span><span id="sBat">---</span></div>
</div>

<div class="btn-row">
 <button class="btn" id="bCon" onclick="doConnect()">YHDISTA</button>
 <button class="btn" id="bDis" onclick="doDisco()" disabled>KATKAISE</button>
</div>

<button class="btn big" id="bAnc" onclick="doAnchorToggle()" disabled style="width:100%;margin-bottom:10px">
 âš“ ANKKURI
</button>

<div class="btn-row">
 <button class="btn" id="bHs" onclick="manualHS()" disabled>HANDSHAKE</button>
 <button class="btn" onclick="doExport()">KOPIOI LOKI</button>
 <button class="btn" onclick="L.textContent=''">TYHJENNA</button>
</div>

<div class="card">
 <h2>Viestiloki</h2>
 <div class="log" id="L">v2.2 - HCI init sequence\n</div>
</div>

<script>
var SVC=0xFFE0,WC=0xFFE1,NC=0xFFE4;
var STX=0xFE,SID=255,CID=190,CID_APP=99;
var MID_HB=0,MID_DEV=7,MID_BATT=27,MID_CL=76,MID_HS=249;
var CX_HB=50,CX_CL=152;
var WIFI_PASS="0123456789",HS_TOKEN="Jz",MOTOR_NAME="HSW_UdUon";

var dev,srv,wCh,nCh,conn=false,hsOk=false,anc=false,seq=0,devName="",bleName="";
var rxBuf=new Uint8Array(0);
var fullLog='';

var L=document.getElementById('L');
var sB=document.getElementById('sB'),sD=document.getElementById('sD');
var sA=document.getElementById('sA'),sBat=document.getElementById('sBat');
var sH=document.getElementById('sH');
var bCon=document.getElementById('bCon'),bDis=document.getElementById('bDis');
var bAnc=document.getElementById('bAnc'),bHs=document.getElementById('bHs');

function ts(){return new Date().toLocaleTimeString('fi',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3})}
function log(m){var s='['+ts()+'] '+m+'\n';fullLog+=s;L.textContent+=s;L.scrollTop=L.scrollHeight}
function hex(d){return Array.from(new Uint8Array(d instanceof ArrayBuffer?d:d.buffer||d)).map(function(b){return b.toString(16).padStart(2,'0').toUpperCase()}).join(' ')}

function crcAcc(d,c){var t=d^(c&0xFF);t^=(t<<4)&0xFF;return((c>>8)&0xFF)^(t<<8)^(t<<3)^((t>>4)&0xFF)&0xFFFF}
function crcCalc(b){var c=0xFFFF;for(var i=0;i<b.length;i++)c=crcAcc(b[i],c);return c}

function buildPkt(mid,pl,cx,sid,cid){
 sid=sid||SID;cid=cid||CID;
 var p=new Uint8Array(8+pl.length);
 p[0]=STX;p[1]=pl.length;p[2]=seq++&0xFF;p[3]=sid;p[4]=cid;p[5]=mid;
 p.set(pl,6);
 var c=crcCalc(p.slice(1,6+pl.length));c=crcAcc(cx,c);
 p[6+pl.length]=c&0xFF;p[7+pl.length]=(c>>8)&0xFF;
 return p;
}

function buildHB(){
 var p=new Uint8Array(9);p[4]=106;p[8]=3;
 return buildPkt(MID_HB,p,CX_HB);
}

function buildHandshake(name){
 var pl=new Uint8Array(31);
 var str=name+','+WIFI_PASS+','+HS_TOKEN;
 for(var i=0;i<str.length&&i<27;i++)pl[4+i]=str.charCodeAt(i);
 return buildPkt(MID_HS,pl,187,SID,CID_APP);
}

// MSG_ID=43: triggers motor to send its name (CRC_EXTRA=132)
function buildMsg43(){
 var pl=new Uint8Array(2);
 return buildPkt(43,pl,132,SID,CID_APP);
}

// MSG_ID=40: part of init sequence (CRC_EXTRA=230)
function buildMsg40(val){
 var pl=new Uint8Array(4);
 pl[0]=val||1;
 return buildPkt(40,pl,230,SID,CID_APP);
}

function buildAnchorCmd(cmd){
 var pl=new Uint8Array(33);
 pl[28]=cmd&0xFF;pl[29]=(cmd>>8)&0xFF;
 return buildPkt(MID_CL,pl,CX_CL);
}

function parseMavlinkStream(newData){
 var combined=new Uint8Array(rxBuf.length+newData.length);
 combined.set(rxBuf);combined.set(newData,rxBuf.length);
 
 var i=0;
 while(i<combined.length){
  if(combined[i]!==STX){i++;continue}
  if(i+1>=combined.length)break;
  var plLen=combined[i+1];
  var total=8+plLen;
  if(i+total>combined.length)break;
  
  var mid=combined[i+5];
  var sysid=combined[i+3];
  var compid=combined[i+4];
  var payload=combined.slice(i+6,i+6+plLen);
  
  if(mid===MID_HS){
   // Check for "Isok" at offset 4
   if(plLen>=8&&payload[4]===73&&payload[5]===115&&payload[6]===111&&payload[7]===107){
    hsOk=true;sH.textContent='OK (Isok)';
    log('[HANDSHAKE] âś… OK! Isok received!');
    updUI();
   }else if(plLen>=4){
    // Motor sends its name in MSG_ID=249 response (SYS=01)
    var txt='';
    for(var j=4;j<plLen&&payload[j]!==0;j++)txt+=String.fromCharCode(payload[j]);
    log('[HS] RX from SYS='+sysid+': "'+txt+'" | '+hex(payload.slice(0,20)));
    
    if(txt.length>0&&!hsOk){
     // Got motor name - try handshake with it
     devName=txt;
     sD.textContent=devName+' ('+bleName+')';
     log('[HS] Motor name: "'+devName+'" - sending handshake...');
     setTimeout(function(){trySendHS(devName)},300);
    }
   }
  }
  else if(mid===MID_DEV&&plLen>=4){
   var name='';for(var j=0;j<plLen&&payload[j]!==0;j++)name+=String.fromCharCode(payload[j]);
   devName=name;sD.textContent=name;
   log('[DEV] MSG_ID=7: "'+name+'"');
   if(conn&&!hsOk)setTimeout(function(){trySendHS(name)},200);
  }
  else if(mid===MID_BATT&&plLen>=24){
   var v=new DataView(payload.buffer,payload.byteOffset);
   var lvl=v.getInt32(16,true);
   var st=v.getInt32(20,true);
   sBat.textContent=lvl+' (st='+st+')';
   log('[BATT] level='+lvl+' state='+st);
  }
  else if(mid===MID_HB){}
  else if(mid===26||mid===30||mid===52){}
  else if(mid===1){
   log('[RX] SYS_STATUS len='+plLen+' | '+hex(payload.slice(0,12)));
  }
  else{
   log('[RX] MSG_ID='+mid+' sys='+sysid+' comp='+compid+' len='+plLen+' | '+hex(payload.slice(0,20)));
  }
  
  i+=total;
 }
 rxBuf=combined.slice(i);
}

async function sendPkt(p,label){
 if(!conn||!wCh)return;
 log('[TX '+label+'] '+hex(p));
 try{await wCh.writeValueWithoutResponse(p)}
 catch(e){try{await wCh.writeValue(p)}catch(e2){log('WRITE FAIL: '+e2.message)}}
}

async function trySendHS(name){
 log('[HS] Sending: "'+name+','+WIFI_PASS+','+HS_TOKEN+'"');
 await sendPkt(buildHandshake(name),'HS('+name+')');
}

var hbInterval=null;

async function doConnect(){
 try{
  log('Scanning for HM_*...');
  dev=await navigator.bluetooth.requestDevice({
   filters:[{namePrefix:'HM_'}],
   optionalServices:[SVC,0xFFE5,0xFFF0,0x180A,0x1800,0x1801]
  });
  bleName=dev.name;
  log('Selected: '+bleName);
  dev.addEventListener('gattserverdisconnected',onDisco);
  
  srv=await dev.gatt.connect();
  var svc=await srv.getPrimaryService(SVC);
  wCh=await svc.getCharacteristic(WC);
  log('FFE1 (write) OK');
  
  try{
   nCh=await svc.getCharacteristic(NC);
   await nCh.startNotifications();
   nCh.addEventListener('characteristicvaluechanged',function(ev){
    parseMavlinkStream(new Uint8Array(ev.target.value.buffer));
   });
   log('FFE4 (notify) OK');
  }catch(e){log('FFE4: '+e.message)}
  
  conn=true;updUI();
  log('=== BLE CONNECTED to '+bleName+' ===');
  sD.textContent=bleName;
  
  // Start heartbeats every 2s
  hbInterval=setInterval(async function(){if(conn)await sendPkt(buildHB(),'HB')},2000);
  
  // === INIT SEQUENCE (matched from HCI snoop log) ===
  sH.textContent='Init...';
  // Step 1: Heartbeat
  await sendPkt(buildHB(),'HB');
  
  // Step 2: MSG_ID=43 + MSG_ID=40 (init)
  setTimeout(async function(){
   log('[INIT] MSG_ID=43...');
   await sendPkt(buildMsg43(),'MSG43');
  },500);
  setTimeout(async function(){
   log('[INIT] MSG_ID=40...');
   await sendPkt(buildMsg40(1),'MSG40');
  },1000);
  
  // Step 3: Handshake with known motor WiFi name
  devName=MOTOR_NAME;
  sD.textContent=MOTOR_NAME+' ('+bleName+')';
  sH.textContent='Handshake...';
  
  setTimeout(async function(){
   if(!hsOk){
    log('[HS] Sending with motor name: '+MOTOR_NAME);
    await trySendHS(MOTOR_NAME);
   }
  },2000);
  
  // Retry
  setTimeout(async function(){
   if(!hsOk){
    log('[HS] Retry...');
    await trySendHS(MOTOR_NAME);
   }
  },4000);
  
  setTimeout(async function(){
   if(!hsOk)log('[HS] Failed. Use HANDSHAKE button.');
   else log('[HS] âś… Connected!');
  },6000);
  
 }catch(e){log('ERROR: '+e.message)}
}

function doDisco(){if(dev&&dev.gatt.connected)dev.gatt.disconnect();onDisco()}
function onDisco(){
 conn=false;hsOk=false;anc=false;wCh=null;nCh=null;devName='';bleName='';
 rxBuf=new Uint8Array(0);
 if(hbInterval){clearInterval(hbInterval);hbInterval=null}
 updUI();sH.textContent='---';sBat.textContent='---';
 log('=== DISCONNECTED ===');
}

async function doAnchorToggle(){
 if(!hsOk)return;
 if(anc){
  await sendPkt(buildAnchorCmd(13),'ANCHOR OFF');
  await new Promise(function(r){setTimeout(r,200)});
  await sendPkt(buildAnchorCmd(13),'ANCHOR OFF');
  anc=false;
 }else{
  await sendPkt(buildAnchorCmd(12),'ANCHOR ON');
  await new Promise(function(r){setTimeout(r,200)});
  await sendPkt(buildAnchorCmd(12),'ANCHOR ON');
  anc=true;
 }
 sA.textContent=anc?'PAALLA':'POIS';updUI();
}

async function manualHS(){
 if(!conn)return;
 var name=prompt('Device name:',devName||bleName);
 if(name!==null){devName=name;await trySendHS(name);}
}

function doExport(){
 var all='Haswing BLE Diag v2.2 - '+new Date().toISOString()+'\nBLE: '+bleName+' Motor: '+devName+'\n\n'+fullLog;
 navigator.clipboard.writeText(all).then(function(){log('Kopioitu!')}).catch(function(){
  var b=new Blob([all],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='haswing_'+Date.now()+'.txt';a.click();
 });
}

function updUI(){
 sB.textContent=conn?(hsOk?'[OK] Valmis':'[BLE] Yhdistetty'):'Ei yhdistetty';
 bCon.disabled=conn;bDis.disabled=!conn;bAnc.disabled=!hsOk;bHs.disabled=!conn;
 bAnc.className=anc?'btn big active':'btn big';
 bAnc.textContent=anc?'âš“ ANKKURI PAALLA':'âš“ ANKKURI';
}

if(!navigator.bluetooth){log('Web Bluetooth ei tuettu! Kayta Chrome Android.');bCon.disabled=true}
</script>
</body>
</html>
